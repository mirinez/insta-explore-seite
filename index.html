<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram - Explore</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============================================================
       HEADER
  -->
  <header class="site-header">
    <!-- Logo -->
    <div class="logo">Instagram</div>
    
    <!-- Search bar -->
    <div class="search-bar">
      <input type="text" class="search-input" placeholder="Suchen" />
    </div>
    
    <!-- Action buttons -->
    <div class="header-actions">
      <button class="btn btn-primary">Anmelden</button>
      <button class="btn btn-secondary">Registrieren</button>
    </div>
  </header>
  <!-- END HEADER -->

  <!-- ============================================================
       MAIN CONTENT WRAPPER
  -->
  <main class="main-content">

    <!-- ============================================================
         PAGE TITLE SECTION
    -->
    <div class="page-title-section">
      <h1 class="page-title">Neues entdecken</h1>
    </div>

    <!-- ============================================================
         FILTER SECTION
    -->
    <div class="filter-section">
      <button class="filter-btn active">Natur & Tiere</button>
      <button class="filter-btn">Videospiele</button>
      <button class="filter-btn">Aktivitäten</button>
      <button class="filter-btn">Kultur</button>
      <button class="filter-btn">Kunst</button>
    </div>

    <!-- ============================================================
         SECTION 1: Natur & Tiere
    -->
    <section class="grid-section">
      <div class="grid-inner">
        <div class="section-header">
          <h2 class="section-title">Natur & Tiere</h2>
          <a href="#" class="section-arrow">></a>
        </div>
        
        <div class="photo-grid">

          <!-- Carousel items -->
           <div class="grid-item">
            <img src="img/post1.jpg" alt="Pflanzen"/>
            <div class="grid-label">Pflanzen</div>
          </div>

          <div class="grid-item">
            <img src="img/post2.jpg" alt="Nashorn"/>
            <div class="grid-label">Nashorn</div>
          </div>
          <div class="grid-item">
            <img src="img/post3.jpg" alt="Adler"/>
            <div class="grid-label">Adler</div>
          </div>
          <div class="grid-item">
            <img src="img/post4.jpg" alt="Koi-Fische"/>
            <div class="grid-label">Koi-Fische</div>
          </div>
          <div class="grid-item">
            <img src="img/post5.jpg" alt="Schildkröten"/>
            <div class="grid-label">Schildkröten</div>
          </div>
          <div class="grid-item">
            <img src="img/post6.jpg" alt="Gebirge"/>
            <div class="grid-label">Gebirge</div>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================================================
         SECTION 2: Videospiele
    -->
    <section class="grid-section">
      <div class="grid-inner">
        <div class="section-header">
          <h2 class="section-title">Videospiele</h2>
          <a href="#" class="section-arrow">></a>
        </div>
        
        <div class="photo-grid">
          
          <!-- Carousel items -->
           <div class="grid-item">
            <img src="img/post7.jpg" alt="Xbox" />
            <div class="grid-label">Xbox</div>
          </div>

          <div class="grid-item">
            <img src="img/post8.jpg" alt="Alte Konsolen" />
            <div class="grid-label">Alte Konsolen</div>
          </div>

          <div class="grid-item">
            <img src="img/post9.jpg" alt="Psvita" />
            <div class="grid-label">Psvita</div>
          </div>

          <div class="grid-item">
            <img src="img/post10.jpg" alt="Nintendo Switch" />
            <div class="grid-label">Nintendo Switch</div>
          </div>

          <div class="grid-item">
            <img src="img/post11.jpg" alt="Neue Tech" />
            <div class="grid-label">Neue Tech</div>
          </div>

          <div class="grid-item">
            <img src="img/post12.jpg" alt="Wrestling" />
            <div class="grid-label">Wrestling</div>
          </div>
        </div>
      </div>
    </section>

  </main>
  <!-- END MAIN CONTENT -->

  <!-- ============================================================
       FOOTER
  -->
  <footer class="site-footer">
    <p>&copy; Míriam Domínguez Martínez - 03.03.2026</p>
  </footer>
  <!-- END FOOTER -->

</body>
</html>
