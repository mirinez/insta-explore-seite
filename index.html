<!DOCTYPE html>
<html lang="de">
<head>
  <!--
       META TAGS
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram - Explore</title>

  <!--
       GOOGLE FONTS
  -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ============================================================
       HEADER
  -->
  <header class="site-header">
    <div class="logo">Instagram</div>

    <div class="search-bar">
      <input type="text" class="search-input" placeholder="Suchen" />
    </div>
  </header>
  <!-- END HEADER -->


  <!-- ============================================================
       MAIN CONTENT
  -->
  <main class="main-content">
    <!-- ============================================================
         SECTION 1: "Neues entdecken"
    -->
    <section class="grid-section">
      <div class="grid-inner">
        <h2 class="section-title">Neues entdecken</h2>
          <div class="photo-grid">

            <!-- FEATURED POST: spans 2 columns and 2 rows -->
            <div class="grid-item featured">
              <img src="img/freatured.gif" alt="Featured post" />
              <div class="grid-overlay">
                <div class="overlay-stat">
                  <span class="overlay-icon">🤍</span>
                  <span>8888</span>
                </div>
                <div class="overlay-stat">
                  <span class="overlay-icon">💬</span>
                  <span>400</span>
                </div>
              </div>
            </div>
            <!-- END FEATURED POST -->

            <!-- REGULAR POSTS -->
            <div class="grid-item">
              <img src="img/post1.gif" alt="Post" />
              <div class="grid-overlay">
                <div class="overlay-stat"><span class="overlay-icon">🤍</span><span>777</span></div>
                <div class="overlay-stat"><span class="overlay-icon">💬</span><span>44</span></div>
              </div>
            </div>

            <div class="grid-item">
              <img src="img/post2.jpg" alt="Post" />
              <div class="grid-overlay">
                <div class="overlay-stat"><span class="overlay-icon">🤍</span><span>666</span></div>
                <div class="overlay-stat"><span class="overlay-icon">💬</span><span>33</span></div>
              </div>
            </div>

            <div class="grid-item">
              <img src="img/post3.jpg" alt="Post" />
              <div class="grid-overlay">
                <div class="overlay-stat"><span class="overlay-icon">🤍</span><span>555</span></div>
                <div class="overlay-stat"><span class="overlay-icon">💬</span><span>22</span></div>
              </div>
            </div>

            <div class="grid-item">
              <img src="img/post4.jpg" alt="Post" />
              <div class="grid-overlay">
                <div class="overlay-stat"><span class="overlay-icon">🤍</span><span>222</span></div>
                <div class="overlay-stat"><span class="overlay-icon">💬</span><span>11</span></div>
              </div>
            </div>

          <div class="grid-item">
            <img src="img/post5.jpg" alt="Post" />
            <div class="grid-overlay">
              <div class="overlay-stat"><span class="overlay-icon">🤍</span><span>111</span></div>
              <div class="overlay-stat"><span class="overlay-icon">💬</span><span>00</span></div>
            </div>
          <!-- END PHOTO GRID -->

        </div>
        <!-- END GRID INNER -->

      </section>
      <!-- END SECTION -->

  </main>
  <!-- END MAIN CONTENT -->

  <!-- ============================================================
       FOOTER
  -->
  <footer class="site-footer">
    <p>&copy; Míriam Domínguez Martínez - 01.03.2026</p>
  </footer>
  <!-- END FOOTER -->

  <!-- ============================================================
       Warum Kommentare auf Englisch?
       Deutsch ist auch nicht meine Zweitsprache, 
       ich lerne alles auf Deutsch und meine Notizen sind auf Deutsch, 
       aber wenn ich HTML oder CSS schreibe, habe ich gemerkt, dass ich mich besser auf Englisch 
       organisiere und bin viel effizienter.
       Auf diese Weise erkenne ich schneller, was ich mache und wofür jedes Element dient, 
       da diese Sprachen auch auf Englisch basieren.
  -->

</body>
</html>
